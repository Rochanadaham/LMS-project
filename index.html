<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect with Vavuniya - LMS Portal</title>
    <link rel="stylesheet" href="vau%20Home%20style.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --primary: #3b82f6;
            --btn-hover: #2563eb;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--btn-hover); }
        .btn-secondary { background-color: #334155; color: white; }
        .btn-secondary:hover { background-color: #475569; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Connect with <span>Vavuniya</span></h1>
        <p>Experience real-time global connectivity with our distributed network infrastructure. Monitor data flows, track performance, and scale across continents with unprecedented reliability.</p>
        
        <div class="btn-group">
            <a href="brik.html" class="btn btn-secondary">Start Exploring →</a>
            <a href="loging%201.html" class="btn btn-primary">Student Portal</a>
            <a href="vau%20Home%201.html" class="btn btn-secondary">University Home</a>
        </div>
    </div>

    <script src="vau%20Home%20java.js"></script>
</body>
</html>
