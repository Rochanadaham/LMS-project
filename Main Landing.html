<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University of Vavuniya | Global Network Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           RESET & BASIS LAYOUT
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #FFFFFF;
            color: #0F172A;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ==========================================================================
           3D CANVAS CONTAINER & ATMOSPHERIC MAPS
           ========================================================================== */
        .landing-hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #globe-3d-canvas-layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            opacity: 0.85;
            pointer-events: none;
        }

        .gradient-mask-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 20%, #FFFFFF 85%);
            z-index: 2;
            pointer-events: none;
        }

        /* ==========================================================================
           MINIMAL MAIN CONTENT ARCHITECTURE
           ========================================================================== */
        .minimal-content-box {
            position: relative;
            max-width: 820px;
            padding: 0 24px;
            text-align: center;
            z-index: 3;
        }

        /* Top Accent Label Pill */
        .network-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: rgba(59, 130, 246, 0.06);
            border: 1px solid rgba(59, 130, 246, 0.15);
            color: #2563EB;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 50px;
            margin-bottom: 28px;
        }

        .network-badge-icon {
            font-size: 10px;
        }

        /* Core Typography */
        .minimal-content-box h1 {
            font-size: 56px;
            font-weight: 800;
            color: #0F172A;
            margin-bottom: 20px;
            line-height: 1.15;
            letter-spacing: -1.5px;
        }

        .minimal-content-box h1 span {
            color: #38BDF8;
            background: linear-gradient(to right, #38BDF8, #2563EB);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline-subtext {
            font-size: 16px;
            color: #475569;
            max-width: 620px;
            margin: 0 auto 36px auto;
            line-height: 1.65;
            font-weight: 400;
        }

        /* Action Buttons Elements */
        .action-button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            align-items: center;
        }

        .btn-explorer-main {
            background-color: #0F172A;
            color: #FFFFFF;
            text-decoration: none;
            padding: 14px 32px;
            font-weight: 600;
            font-size: 14px;
            border-radius: 50px;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 14px rgba(15, 23, 42, 0.15);
        }

        .btn-explorer-main:hover {
            background-color: #1E293B;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(15, 23, 42, 0.2);
        }

        .btn-explorer-secondary {
            background-color: #FFFFFF;
            color: #475569;
            text-decoration: none;
            padding: 13px 32px;
            font-weight: 600;
            font-size: 14px;
            border-radius: 50px;
            border: 1px solid #E2E8F0;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-explorer-secondary:hover {
            background-color: #F8FAFC;
            color: #0F172A;
            border-color: #CBD5E1;
            transform: translateY(-2px);
        }

        /* Mobile Adjustments */
        @media (max-width: 640px) {
            .minimal-content-box h1 { font-size: 38px; letter-spacing: -0.5px; }
            .tagline-subtext { font-size: 14px; }
            .action-button-group { flex-direction: column; gap: 12px; }
            .btn-explorer-main, .btn-explorer-secondary { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <main class="landing-hero">
        <div id="globe-3d-canvas-layer"></div>
        <div class="gradient-mask-overlay"></div>

        <div class="minimal-content-box">
            <div class="network-badge">
                <span class="network-badge-icon">⚡</span>
                <span>Global Network</span>
            </div>
            
            <h1>Connect <span>with Vavuniya</span></h1>
            
            <p class="tagline-subtext">
                Experience real-time global connectivity with our distributed network infrastructure. Monitor data flows, track performance, and scale across continents with unprecedented reliability.
            </p>
            
            <div class="action-button-group">
                <a href="C:\Users\rocha\Downloads\VAU\vau Home 1.html" class="btn-explorer-main">
                    <span>Start Exploring</span>
                    <span style="font-size: 16px;">&rarr;</span>
                </a>
                
                <a href="C:\Users\rocha\Downloads\VAU\LMS\API\Public\loging 1.html" class="btn-explorer-secondary">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <span>Student Portal</span>
                </a>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('globe-3d-canvas-layer');
            if (!container) return;

            // 1. Core Scene Workspace Setup
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.z = 4.5;

            // 2. WebGL Hardware Accelerated Renderer Configurations
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // 3. Mathematical Coordinate Matrix for Generating the Connected Point Cloud Globe
            const radius = 2.2;
            const particleCount = 1800; // Dense network points mapping to your reference image layout
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                // Generate uniform distribution points across a sphere surface structure
                const phi = Math.acos(Math.random() * 2 - 1);
                const theta = Math.random() * Math.PI * 2;

                positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = radius * Math.cos(phi);
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            // 4. Subtle Light Blue/Cyan Material Styling representing Data Nodes
            const material = new THREE.PointsMaterial({
                color: 0x7DD3FC, // Match soft blue node colors from reference image
                size: 0.025,
                transparent: true,
                opacity: 0.75,
                sizeAttenuation: true
            });

            const pointCloudGlobe = new THREE.Points(geometry, material);
            scene.add(pointCloudGlobe);

            // 5. Secondary Delicate Outer Wireframe Mesh Matrix for Line Interconnections
            const wireframeGeom = new THREE.SphereGeometry(radius, 32, 32);
            const wireframeMat = new THREE.MeshBasicMaterial({
                color: 0x38BDF8,
                wireframe: true,
                transparent: true,
                opacity: 0.08
            });
            const outerMeshGrid = new THREE.Mesh(wireframeGeom, wireframeMat);
            scene.add(outerMeshGrid);

            // 6. Execution Loop Core Physics Rotation Frame System
            const animateEngine = () => {
                requestAnimationFrame(animateEngine);
                
                // Float properties simulation coordinates logic
                pointCloudGlobe.rotation.y += 0.0012;
                pointCloudGlobe.rotation.x += 0.0003;
                
                outerMeshGrid.rotation.y += 0.0012;
                outerMeshGrid.rotation.x += 0.0003;

                renderer.render(scene, camera);
            };
            animateEngine();

            // 7. Dynamic Viewport Resizing Handler Configuration
            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
        });
    </script>
</body>
</html>
